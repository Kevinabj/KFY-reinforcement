# SAC on MountainCarContinuous-v0 (sparse reward)
# Larger learning_starts for richer initial buffer; otherwise canonical SAC.
gamma: 0.9999
tau: 0.005
lr_actor: 3.0e-4
lr_critic: 3.0e-4
lr_alpha: 3.0e-4
buffer_size: 100000
batch_size: 256
hidden: [256, 256]
learning_starts: 10000
train_freq: 1
gradient_steps: 1
autotune_alpha: true
init_log_alpha: 0.0
target_entropy_scale: 1.0
